# ── Datasource — H2 file mode ────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:file:./data/bookshelf
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
# Run data.sql after Hibernate DDL so tables exist when seed statements execute
spring.jpa.defer-datasource-initialization=true

# ── SQL init ──────────────────────────────────────────────────────────────────
# H2 file-mode is not always auto-detected as "embedded"; force script execution
spring.sql.init.mode=always

# ── H2 console (local dev only) ───────────────────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
